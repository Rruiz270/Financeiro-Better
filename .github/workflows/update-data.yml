name: Update Financial Data

on:
  schedule:
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
    - cron: '0 14 1,11,21 * *'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Full refresh (fetch all data from scratch)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Determine refresh mode
        id: mode
        run: |
          CRON="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.full_refresh }}"
          if [ "$MANUAL" = "true" ] || [ "$CRON" = "0 14 1,11,21 * *" ]; then
            echo "FULL_REFRESH=true" >> $GITHUB_ENV
            echo "Full refresh mode"
          else
            echo "FULL_REFRESH=false" >> $GITHUB_ENV
            echo "Incremental mode"
          fi

      - name: Update data from APIs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VINDI_KEY: ${{ secrets.VINDI_KEY }}
          PAGARME_KEY: ${{ secrets.PAGARME_KEY }}
          OMIE_APP_KEY: ${{ secrets.OMIE_APP_KEY }}
          OMIE_APP_SECRET: ${{ secrets.OMIE_APP_SECRET }}
          BMA_KEY: ${{ secrets.BMA_KEY }}
          BMA_SECRET: ${{ secrets.BMA_SECRET }}
          FULL_REFRESH: ${{ env.FULL_REFRESH }}
        run: python update_data.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add *.js
          git diff --cached --quiet || git commit -m "chore: data update $(date +%Y-%m-%d) ${{ env.FULL_REFRESH == 'true' && '(full refresh)' || '(incremental)' }}"
          git push
